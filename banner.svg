<svg width="920" height="220" viewBox="0 0 920 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%"   stop-color="#12102a"/>
      <stop offset="100%" stop-color="#06060f"/>
    </radialGradient>
    <!-- Node glow gradient -->
    <radialGradient id="ng1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ng2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ng3" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a5b4fc"/>
      <stop offset="50%"  stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip path -->
    <clipPath id="clip"><rect width="920" height="220" rx="14"/></clipPath>
    <!-- Particle marker -->
    <circle id="dot" r="2.2" fill="#818cf8" opacity="0.9"/>
  </defs>

  <style>
    @keyframes pulse1 { 0%,100%{opacity:.45;r:6} 50%{opacity:1;r:8} }
    @keyframes pulse2 { 0%,100%{opacity:.4;r:5} 50%{opacity:.95;r:7} }
    @keyframes pulse3 { 0%,100%{opacity:.5;r:7} 50%{opacity:1;r:9} }
    @keyframes glow1  { 0%,100%{opacity:.2} 50%{opacity:.55} }
    @keyframes glow2  { 0%,100%{opacity:.15} 50%{opacity:.4} }
    @keyframes flow   { 0%{stroke-dashoffset:220} 100%{stroke-dashoffset:0} }
    @keyframes flowR  { 0%{stroke-dashoffset:0} 100%{stroke-dashoffset:220} }
    @keyframes title  { 0%,100%{opacity:.88} 50%{opacity:1} }
    @keyframes scanX  { 0%{transform:translateX(-50px)} 100%{transform:translateX(970px)} }
    @keyframes bob    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }

    .edge        { fill:none; stroke-width:1; stroke-linecap:round }
    .edge-static { stroke:#2d2b55; stroke-dasharray:none }
    .edge-flow   { stroke:#6366f1; stroke-dasharray:6 18; animation:flow 3s linear infinite }
    .edge-flow2  { stroke:#8b5cf6; stroke-dasharray:4 20; animation:flow 4s linear infinite }
    .edge-flowr  { stroke:#6366f1; stroke-dasharray:6 18; animation:flowR 3.5s linear infinite }
    .edge-flowc  { stroke:#06b6d4; stroke-dasharray:5 22; animation:flow 5s linear infinite }

    .node-glow-i { animation:glow1 2.5s ease-in-out infinite }
    .node-glow-v { animation:glow2 3s ease-in-out infinite }
    .node-glow-c { animation:glow1 3.5s ease-in-out infinite }

    .n-i  { animation:pulse1 2.5s ease-in-out infinite }
    .n-v  { animation:pulse2 3.1s ease-in-out infinite }
    .n-c  { animation:pulse3 2.8s ease-in-out infinite }
    .n-s  { animation:pulse1 3.4s ease-in-out infinite }

    .title-text  { animation:title 4s ease-in-out infinite }
    .scan-line   { animation:scanX 6s linear infinite; opacity:.04 }
    .bob-group   { animation:bob 5s ease-in-out infinite }
  </style>

  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="920" height="220" fill="url(#bg)"/>

    <!-- Subtle grid -->
    <g stroke="#ffffff" stroke-opacity="0.022" stroke-width="1">
      <line x1="0" y1="40"  x2="920" y2="40"/>
      <line x1="0" y1="80"  x2="920" y2="80"/>
      <line x1="0" y1="120" x2="920" y2="120"/>
      <line x1="0" y1="160" x2="920" y2="160"/>
      <line x1="0" y1="200" x2="920" y2="200"/>
      <line x1="115" y1="0" x2="115" y2="220"/>
      <line x1="230" y1="0" x2="230" y2="220"/>
      <line x1="345" y1="0" x2="345" y2="220"/>
      <line x1="460" y1="0" x2="460" y2="220"/>
      <line x1="575" y1="0" x2="575" y2="220"/>
      <line x1="690" y1="0" x2="690" y2="220"/>
      <line x1="805" y1="0" x2="805" y2="220"/>
    </g>

    <!-- Scan line sweep -->
    <rect class="scan-line" x="-50" y="0" width="100" height="220" fill="white"/>

    <!-- ── Edges (static base) ── -->
    <!-- Left cluster → center -->
    <line class="edge edge-static" x1="115" y1="60"  x2="310" y2="95"/>
    <line class="edge edge-static" x1="115" y1="160" x2="310" y2="125"/>
    <line class="edge edge-static" x1="200" y1="40"  x2="310" y2="90"/>
    <line class="edge edge-static" x1="200" y1="180" x2="310" y2="130"/>
    <!-- Center → right cluster -->
    <line class="edge edge-static" x1="610" y1="95"  x2="805" y2="60"/>
    <line class="edge edge-static" x1="610" y1="125" x2="805" y2="160"/>
    <line class="edge edge-static" x1="610" y1="90"  x2="720" y2="40"/>
    <line class="edge edge-static" x1="610" y1="130" x2="720" y2="180"/>
    <!-- Cross edges -->
    <line class="edge edge-static" x1="115" y1="60"  x2="200" y2="40"  stroke-opacity="0.3"/>
    <line class="edge edge-static" x1="115" y1="160" x2="200" y2="180" stroke-opacity="0.3"/>
    <line class="edge edge-static" x1="805" y1="60"  x2="720" y2="40"  stroke-opacity="0.3"/>
    <line class="edge edge-static" x1="805" y1="160" x2="720" y2="180" stroke-opacity="0.3"/>

    <!-- ── Animated data-flow edges ── -->
    <line class="edge edge-flow"  x1="115" y1="60"  x2="310" y2="95"/>
    <line class="edge edge-flow2" x1="115" y1="160" x2="310" y2="125" style="animation-delay:.8s"/>
    <line class="edge edge-flow"  x1="200" y1="40"  x2="310" y2="90"  style="animation-delay:1.5s"/>
    <line class="edge edge-flowr" x1="310" y1="110" x2="610" y2="110"/>
    <line class="edge edge-flow"  x1="610" y1="95"  x2="805" y2="60"  style="animation-delay:.5s"/>
    <line class="edge edge-flowc" x1="610" y1="125" x2="805" y2="160" style="animation-delay:1.2s"/>
    <line class="edge edge-flow2" x1="610" y1="90"  x2="720" y2="40"  style="animation-delay:2s"/>
    <line class="edge edge-flowc" x1="200" y1="180" x2="310" y2="130" style="animation-delay:2.5s"/>
    <line class="edge edge-flow"  x1="610" y1="130" x2="720" y2="180" style="animation-delay:1.8s"/>

    <!-- ── Node glows ── -->
    <!-- Indigo nodes glow -->
    <circle class="node-glow-i" cx="115" cy="60"  r="22" fill="url(#ng1)"/>
    <circle class="node-glow-v" cx="200" cy="40"  r="18" fill="url(#ng2)"/>
    <circle class="node-glow-i" cx="805" cy="60"  r="22" fill="url(#ng1)"/>
    <circle class="node-glow-c" cx="720" cy="40"  r="18" fill="url(#ng3)"/>
    <circle class="node-glow-v" cx="115" cy="160" r="22" fill="url(#ng2)"/>
    <circle class="node-glow-i" cx="200" cy="180" r="18" fill="url(#ng1)"/>
    <circle class="node-glow-c" cx="805" cy="160" r="22" fill="url(#ng3)"/>
    <circle class="node-glow-v" cx="720" cy="180" r="18" fill="url(#ng2)"/>
    <!-- Center glow -->
    <circle cx="460" cy="110" r="65" fill="#6366f1" opacity="0.06"/>
    <circle cx="460" cy="110" r="40" fill="#6366f1" opacity="0.07"/>

    <!-- ── Bobbing group ── -->
    <g class="bob-group">
      <!-- Left nodes -->
      <circle class="n-i"  cx="115" cy="60"  r="7"  fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5" filter="url(#glow)"/>
      <circle class="n-v"  cx="200" cy="40"  r="5.5" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="1.5" filter="url(#glow)" style="animation-delay:.7s"/>
      <circle class="n-v"  cx="115" cy="160" r="7"  fill="#1e1b4b" stroke="#8b5cf6" stroke-width="1.5" filter="url(#glow)" style="animation-delay:1.2s"/>
      <circle class="n-i"  cx="200" cy="180" r="5.5" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5" filter="url(#glow)" style="animation-delay:.4s"/>

      <!-- Right nodes -->
      <circle class="n-i"  cx="805" cy="60"  r="7"  fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5" filter="url(#glow)" style="animation-delay:.9s"/>
      <circle class="n-c"  cx="720" cy="40"  r="5.5" fill="#0c1a2e" stroke="#06b6d4" stroke-width="1.5" filter="url(#glow)" style="animation-delay:1.6s"/>
      <circle class="n-c"  cx="805" cy="160" r="7"  fill="#0c1a2e" stroke="#06b6d4" stroke-width="1.5" filter="url(#glow)" style="animation-delay:.3s"/>
      <circle class="n-v"  cx="720" cy="180" r="5.5" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="1.5" filter="url(#glow)" style="animation-delay:2.1s"/>

      <!-- Center hub -->
      <circle cx="460" cy="110" r="14" fill="#1a1730" stroke="#6366f1" stroke-width="2" filter="url(#softGlow)"/>
      <circle class="n-s"  cx="460" cy="110" r="7"  fill="#6366f1" opacity="0.85" style="animation-delay:.5s"/>

      <!-- Sub-center nodes -->
      <circle class="n-v"  cx="310" cy="95"  r="5"  fill="#1e1b4b" stroke="#8b5cf6" stroke-width="1.5" style="animation-delay:1s"/>
      <circle class="n-v"  cx="310" cy="125" r="5"  fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5" style="animation-delay:1.9s"/>
      <circle class="n-i"  cx="610" cy="95"  r="5"  fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5" style="animation-delay:.6s"/>
      <circle class="n-c"  cx="610" cy="125" r="5"  fill="#0c1a2e" stroke="#06b6d4" stroke-width="1.5" style="animation-delay:1.4s"/>
    </g>

    <!-- ── Title ── -->
    <text class="title-text" x="460" y="100" text-anchor="middle"
      font-family="'SF Pro Display','Segoe UI','Inter',system-ui,sans-serif"
      font-size="62" font-weight="800" letter-spacing="-1"
      fill="url(#titleGrad)" filter="url(#titleGlow)">RAGNA</text>

    <!-- Subtitle -->
    <text x="460" y="128" text-anchor="middle"
      font-family="'SF Pro Text','Segoe UI','Inter',system-ui,sans-serif"
      font-size="12.5" font-weight="500" letter-spacing="6"
      fill="#6366f1" opacity="0.9">AI MEMORY COMPILER</text>

    <!-- Tag line -->
    <text x="460" y="152" text-anchor="middle"
      font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace"
      font-size="10" letter-spacing="2" fill="#4b5563" opacity="0.9">
      ENCRYPT · INDEX · UNDERSTAND · RETRIEVE
    </text>

    <!-- Corner dots -->
    <circle cx="18" cy="18" r="3" fill="#6366f1" opacity="0.35"/>
    <circle cx="34" cy="18" r="2" fill="#8b5cf6" opacity="0.25"/>
    <circle cx="902" cy="18" r="3" fill="#06b6d4" opacity="0.35"/>
    <circle cx="886" cy="18" r="2" fill="#6366f1" opacity="0.25"/>
    <circle cx="18" cy="202" r="3" fill="#8b5cf6" opacity="0.25"/>
    <circle cx="902" cy="202" r="3" fill="#6366f1" opacity="0.25"/>

    <!-- Frame border -->
    <rect width="920" height="220" rx="14" fill="none" stroke="#6366f1" stroke-opacity="0.18" stroke-width="1"/>
    <rect x="1" y="1" width="918" height="218" rx="13" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  </g>
</svg>
